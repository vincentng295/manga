<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga của VincentNG295</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff3e3e;
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent-glow: rgba(255, 62, 62, 0.4);
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            padding: 40px 5%;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(45deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 100px 5%;
        }

        #manga-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            transition: opacity 0.3s ease;
        }

        /* TRẠNG THÁI CHỜ ĐỒNG BỘ */
        #manga-list.is-loading {
            opacity: 0.3;
            pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow);
            border-color: var(--primary-color);
        }

        .img-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: #202020; /* Khung nền chờ ảnh */
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card img.loaded {
            opacity: 1;
        }

        /* BADGE "CHƯA ĐỌC" */
        .badge-unread {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(255, 62, 62, 0.5);
        }

        /* Ẩn badge khi đã đọc */
        .is-read .badge-unread {
            display: none;
        }
        
        /* Làm mờ nhẹ card đã đọc để tăng tính Cosmetic phân loại */
        .is-read img.loaded {
            opacity: 0.6;
        }

        .card-info {
            padding: 15px;
        }

        .card h3 {
            margin: 0;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        footer {
            background: #111;
            padding: 40px 5%;
            text-align: center;
            margin-top: 50px;
        }

        .contact-box a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            #manga-list { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .img-container { height: 210px; }
        }
    </style>
</head>
<body>

<header>
    <h1>VINCENT MANGA</h1>
    <p>Thư viện truyện tranh cá nhân của VincentNG295</p>
</header>

<div class="container">
    <div id="manga-list" class="is-loading">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-sub);">Đang đồng bộ thư viện dữ liệu...</p>
    </div>
</div>

<footer>
    <p>© 2026 VincentNG295 Library</p>
    <div class="contact-box">
        📩 Contact: <a href="mailto:thevi917@gmail.com">thevi917@gmail.com</a>
    </div>
</footer>

<script>
let readList = [];
let isDatabaseReady = false;

// --- CẤU HÌNH CƠ SỞ DỮ LIỆU INDEXEDDB (Chung database với reader.html) ---
const DB_NAME = "MangaCacheDB";
const DB_VERSION = 1;
const STORE_NAME = "images";
let db = null;

function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
                database.createObjectStore(STORE_NAME);
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };
        request.onerror = (e) => reject("IndexedDB error: " + e.target.error);
    });
}

function getCacheImage(key) {
    return new Promise((resolve) => {
        if (!db) return resolve(null);
        const transaction = db.transaction(STORE_NAME, "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => resolve(null);
    });
}

function setCacheImage(key, blob) {
    if (!db) return;
    const transaction = db.transaction(STORE_NAME, "readwrite");
    const store = transaction.objectStore(STORE_NAME);
    store.put(blob, key);
}

// --- HÀM XỬ LÝ LẤY ẢNH BÌA TỪ CACHE HOẶC SERVER ---
async function setCardCover(imgElement, coverPath) {
    // cacheKey đồng bộ định dạng với trang đọc truyện: "slug/tên-file-ảnh"
    const cacheKey = `cover/${coverPath}`;
    
    imgElement.onload = () => {
        imgElement.classList.add("loaded");
        if (imgElement.src.startsWith('blob:')) {
            imgElement.addEventListener('load', () => URL.revokeObjectURL(imgElement.src), { once: true });
        }
    };

    try {
        const cachedBlob = await getCacheImage(cacheKey);
        if (cachedBlob) {
            // Lấy từ IndexedDB ra nếu đã có cache
            imgElement.src = URL.createObjectURL(cachedBlob);
        } else {
            // Chưa có cache -> Nạp thẳng bằng link thường trước để tối ưu tốc độ hiển thị mắt người
            imgElement.src = coverPath;
            
            // Chạy ngầm việc tải blob và cất vào IndexedDB cho lần sau
            fetch(coverPath)
                .then(res => {
                    if (res.ok) return res.blob();
                    throw new Error();
                })
                .then(blob => setCacheImage(cacheKey, blob))
                .catch(e => console.warn("Không thể tải ngầm cache cho ảnh bìa:", cacheKey));
        }
    } catch (err) {
        // Dự phòng khi lỗi DB
        imgElement.src = coverPath;
    }
}

// HÀM ĐỒNG BỘ NỀN TẢNG (Engine Core)
async function initMangaLibrary() {
    const container = document.getElementById('manga-list');
    
    try {
        // 1. Ép hệ thống đồng bộ dữ liệu local trước
        const localData = localStorage.getItem('readManga');
        readList = localData ? JSON.parse(localData) : [];
        
        // Khởi tạo IndexedDB song song
        await initDB().catch(err => console.warn(err));
        
        // 2. Chờ fetch danh sách cấu trúc truyện về hoàn tất
        const response = await fetch('list_manga.json');
        if (!response.ok) throw new Error("Mạng không phản hồi cấu trúc JSON");
        
        const mangaData = await response.json();
        
        // 3. Xóa trạng thái loading, dọn sạch khung chứa
        container.innerHTML = "";
        container.classList.remove('is-loading');
        
        // 4. Render đồng bộ toàn bộ mảng dữ liệu sạch
        mangaData.forEach(manga => {
            const isRead = readList.includes(manga.slug);
            const card = document.createElement('a');
            card.href = `reader.html?slug=${manga.slug}`;
            card.className = `card ${isRead ? 'is-read' : ''}`;
            
            // Hàm lưu trạng thái khi click
            card.onclick = () => markAsRead(manga.slug);

            card.innerHTML = `
                <div class="img-container">
                    <span class="badge-unread">Chưa đọc</span>
                    <img id="cover-${manga.slug}" alt="${manga.title}">
                </div>
                <div class="card-info">
                    <h3>${manga.title}</h3>
                </div>
            `;
            container.appendChild(card);
            
            // Gọi hàm xử lý nạp ảnh bìa thông minh
            const imgTarget = document.getElementById(`cover-${manga.slug}`);
            setCardCover(imgTarget, manga.cover);
        });

        isDatabaseReady = true;
        console.log("[Library Engine] Thư viện đồng bộ thành công!");

    } catch (err) {
        console.error("[Library Engine] Lỗi khởi tạo đồng bộ:", err);
        container.innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: var(--primary-color);">Lỗi tải danh sách truyện hoặc đồng bộ bộ nhớ thất bại.</p>`;
        container.classList.remove('is-loading');
    }
}

// Hàm ghi nhận đã đọc dữ liệu
function markAsRead(slug) {
    if (!readList.includes(slug)) {
        readList.push(slug);
        localStorage.setItem('readManga', JSON.stringify(readList));
    }
}

// KÍCH HOẠT VÒNG CHẠY ĐỒNG BỘ NGAY KHI TẢI TRANG
document.addEventListener("DOMContentLoaded", initMangaLibrary);
</script>

</body>
</html>

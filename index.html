<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga của VincentNG295</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}

.title {
  padding: 20px;
  font-size: 24px;
}

/* GRID */
#manga-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.08);
  z-index: 2;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.3s;
}

.card:hover img {
  transform: scale(1.1);
}

/* TITLE OVERLAY */
.card h3 {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  margin: 0;
  font-size: 14px;
  z-index: 2;
}

/* overlay gradient */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

a {
  text-decoration: none;
  color: white;
}

/* mobile */
@media (max-width: 600px) {
  .card img {
    height: 180px;
  }
}
</style>
</head>

<body>

<h1 class="title">📚 Manga của VincentNG295</h1>

<div id="manga-list"></div>

<script>
fetch('list_manga.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('manga-list');

    data.forEach(manga => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <a href="reader.html?slug=${manga.slug}">
          <img src="${manga.cover}" loading="lazy">
          <h3>${manga.title}</h3>
        </a>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    document.body.innerHTML += "<p style='padding:20px'>Không load được list_manga</p>";
  });
</script>

</body>
</html>
